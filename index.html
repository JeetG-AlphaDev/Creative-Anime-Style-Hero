<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neonverse Asta Hero</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="landing-stack">
    <main class="hero" aria-label="Neonverse anime hero">
      <div class="hero__grain" aria-hidden="true"></div>
      <div class="hero__scanline hero__scanline--left" aria-hidden="true"></div>
      <div class="hero__scanline hero__scanline--right" aria-hidden="true"></div>

      <header class="nav">
        <a class="brand" href="#" aria-label="Neonverse home">
          <span class="brand__mark" aria-hidden="true">
            <span></span>
          </span>
          <span class="brand__text">NEON<span>VERSE</span></span>
        </a>

        <nav class="nav__links" aria-label="Primary">
          <a href="#">Home</a>
          <a class="is-active" href="#">Characters</a>
          <a href="#">Neon Shop</a>
          <a href="#">Community</a>
        </nav>

        <a class="nav__cta clipped-btn" href="#">
          <span class="brand__mark brand__mark--button" aria-hidden="true">
            <span></span>
          </span>
          <span>Join the Network</span>
        </a>
      </header>

      <section class="hero__stage">
        <div class="series-tag">
          <span data-text="Black">Black</span>
          <span data-text="Clover">Clover</span>
          <i aria-hidden="true"></i>
        </div>

        <div class="side-rail" aria-hidden="true">
          <i class="side-rail__line"></i>
          <span></span>
          <b></b>
          <b></b>
          <em></em>
        </div>

        <img
          class="paint-layer"
          src="Red paint .png"
          alt=""
          aria-hidden="true"
        />
        <h1 class="mega-title" aria-label="ASTA">
          <span class="mega-title__part mega-title__part--left" aria-hidden="true">AS</span>
          <span class="mega-title__part mega-title__part--right" aria-hidden="true">TA</span>
        </h1>
        <div class="character-stack" role="img" aria-label="Asta from Black Clover">
          <img
            class="character character--base"
            src="Character.png"
            alt=""
            aria-hidden="true"
          />
          <img
            class="character character--devil"
            src="Character Devil Union.png"
            alt=""
            aria-hidden="true"
          />
          <canvas class="framer-reveal-canvas" aria-hidden="true"></canvas>
          <span class="character-reveal-edge" aria-hidden="true"></span>
        </div>

        <article class="info-card">
          <div class="info-card__texture" aria-hidden="true"></div>
          <a class="info-card__orb" href="#" aria-label="Open character details">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 17 17 7" />
              <path d="M8 7h9v9" />
            </svg>
          </a>
          <div class="info-card__copy">
            <h2>ASTA</h2>
            <p>A boy who aims to become<br />the Wizard King.</p>
          </div>
          <a class="info-card__button clipped-btn" href="#">
            <span>Explore More</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h13" />
              <path d="m13 6 6 6-6 6" />
            </svg>
          </a>
        </article>

        <aside class="quote-panel">
          <h2 lang="ja">未来は自分で切り開く。</h2>
          <div class="quote-panel__slash" aria-hidden="true"></div>
          <p>I will surpass my limits.<br />No magic? No problem.<br />I’ll still rise.</p>
        </aside>

        <div class="bottom-tech" aria-hidden="true">
          <span class="mini-box"></span>
          <span class="barcode"></span>
          <span class="plus"></span>
          <span class="hairline"><i></i></span>
        </div>

        <div class="socials" aria-label="Social links">
          <a href="#">Twitter <span>◆</span></a>
          <a href="#">Discord <span>⌘</span></a>
          <a href="#">Youtube <span>▶</span></a>
        </div>
      </section>
    </main>
    <section class="cinematic-video" aria-label="Asta cinematic reveal">
      <div class="cinematic-video__backdrop" aria-hidden="true"></div>
      <div class="cinematic-video__media">
        <iframe
          src="https://assets.pinterest.com/ext/embed.html?id=1011128553820130615"
          title="Asta cinematic video"
          height="714"
          width="345"
          frameborder="0"
          scrolling="no"
          allow="fullscreen; encrypted-media"
          loading="lazy"
        ></iframe>
      </div>
    </section>
    </div>
    <aside class="devil-tuner" aria-label="Temporary Devil Union image controls">
      <div class="devil-tuner__head">
        <strong>Devil Image Controls</strong>
        <span>Temporary</span>
        <button class="devil-tuner__toggle" type="button" aria-label="Minimize Devil image controls" aria-expanded="true">
          <span aria-hidden="true"></span>
        </button>
      </div>
      <label class="devil-tuner__row">
        <span>Scale <output data-devil-output="scale">2.35</output></span>
        <input data-devil-control="scale" type="range" min="0.8" max="4" step="0.01" />
      </label>
      <label class="devil-tuner__row">
        <span>X Position <output data-devil-output="x">2.4%</output></span>
        <input data-devil-control="x" type="range" min="-45" max="45" step="0.1" />
      </label>
      <label class="devil-tuner__row">
        <span>Y Position <output data-devil-output="y">0%</output></span>
        <input data-devil-control="y" type="range" min="-45" max="45" step="0.1" />
      </label>
      <div class="devil-tuner__actions">
        <button class="devil-tuner__save" type="button">Save</button>
        <button class="devil-tuner__apply" type="button">Use Saved</button>
        <button class="devil-tuner__reset" type="button">Reset</button>
      </div>
    </aside>
    <script src="vendor/gsap.min.js"></script>
    <script src="vendor/ScrollTrigger.min.js"></script>
    <script src="vendor/three.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
